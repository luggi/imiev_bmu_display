; CrowPanel 5" ESP32-S3 HMI display (800x480 RGB, GT911 touch)
; Module: ESP32-S3-WROOM-1-N4R8  (4MB flash, 8MB octal PSRAM)
;
; Toolchain pinning: Arduino-ESP32 core 2.0.14 (PlatformIO 6.7.0) is the
; sweet spot for LovyanGFX + this board. Core 3.x changes esp_lcd APIs
; and breaks the LovyanGFX RGB panel driver as of mid-2026.

[env:crowpanel5]
platform              = espressif32@6.7.0
board                 = esp32-s3-devkitc-1
framework             = arduino

upload_speed          = 921600
monitor_speed         = 115200
monitor_filters       = esp32_exception_decoder, default

; --- ESP32-S3 N4R8 memory configuration ---------------------------------
board_build.arduino.memory_type = qio_opi   ; flash QIO, PSRAM OPI (octal)
board_build.flash_mode          = qio
board_build.psram_type          = opi
board_upload.flash_size         = 4MB
board_build.partitions          = huge_app.csv   ; need >1MB for LVGL+demo

; --- Build flags --------------------------------------------------------
build_flags =
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D LV_CONF_INCLUDE_SIMPLE          ; lv_conf.h is in include/, found via -I include
    -D CORE_DEBUG_LEVEL=3
    -I include
    ; Lift LovyanGFX's RGB-panel pixel-clock cap a bit; the panel is happy
    ; at 14-16 MHz. Tune downward if you see tearing.
    -D LGFX_USE_V1

; --- Libraries ----------------------------------------------------------
lib_deps =
    lvgl/lvgl @ ^9.2.2
    lovyan03/LovyanGFX @ ^1.2.0

lib_ldf_mode = deep+
